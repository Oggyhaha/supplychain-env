# openenv.yaml
name: supplychain-env
version: 1.0.0
description: >
  A real-world supply chain inventory management
  environment where an AI agent manages warehouse
  inventory across multiple SKUs, suppliers, and
  demand patterns. Simulates procurement decisions
  including reorder timing, supplier selection,
  budget allocation, and disruption handling.

author: Oggyis1
license: MIT
tags:
  - openenv
  - supply-chain
  - inventory-management
  - reinforcement-learning

api:
  base_url: "http://localhost:7860"
  reset:  "/reset/{task_id}"
  step:   "/step/{task_id}"
  state:  "/state/{task_id}"
  health: "/health"

tasks:
  - id: task_easy
    name: "Single SKU Inventory Management"
    difficulty: easy
    max_steps: 30
    success_threshold: 0.5
    description: >
      Manage inventory for one product over 30 days.
      Stable demand. Budget of $50,000.

  - id: task_medium
    name: "Multi-SKU Budget Management"
    difficulty: medium
    max_steps: 60
    success_threshold: 0.5
    description: >
      Manage 4 products over 60 days with $200,000
      budget. Different demand patterns per SKU.

  - id: task_hard
    name: "Supplier Disruption Crisis"
    difficulty: hard
    max_steps: 90
    success_threshold: 0.5
    description: >
      Manage 5 products over 90 days. Supplier goes
      bankrupt on day 45. Holiday surge on days 75-90.

observation_space:
  type: object
  description: "Daily warehouse state"
  fields:
    current_day: {type: integer}
    inventory: {type: object}
    pending_orders: {type: array}
    budget_remaining: {type: number}
    demand_forecast: {type: object}
    suppliers: {type: array}
    skus: {type: array}

action_space:
  type: object
  description: "Daily restock decisions"
  fields:
    orders:
      type: array
      items:
        sku_id: {type: string}
        supplier_id: {type: string}
        quantity: {type: integer}
    reasoning: {type: string}

reward:
  min: 0.0
  max: 1.0
  type: float
  description: >
    Daily reward based on service level,
    inventory health, and budget efficiency.